<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织伴 | 项目详情</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="project-page">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="top-nav" aria-label="主导航">
      <div class="brand-wrap">
        <div class="brand">织伴</div>
        <p class="brand-subtitle">把时间织成柔软的样子</p>
        <p class="eyebrow nav-eyebrow">KNIT COMPANION</p>
      </div>
      <div class="nav-center" aria-label="页面标签">
        <a class="btn ghost is-tab-active" href="index.html#dashboardPanel">项目仪表盘</a>
        <a class="btn ghost" href="yarn.html">毛线仓库</a>
        <a class="btn ghost" href="swatch.html">小样仓库</a>
        <a class="btn ghost" href="stats.html">数据统计</a>
      </div>
      <div class="nav-auth" id="navAuth">
        <button class="nav-auth-trigger" id="navAuthTrigger" type="button" aria-label="账号菜单" aria-expanded="false" tabindex="0">
          <span>☰</span>
        </button>
        <div class="nav-auth-menu" id="navAuthMenu">
          <button class="sync-state sync-state-idle" id="syncHint" type="button" title="点击立即同步">☁️ 离线模式</button>
          <span class="account-chip" id="accountChip">当前账号：未登录</span>
          <button class="btn ghost" id="openLoginBtn" type="button">登录</button>
          <button class="btn ghost" id="openRegisterBtn" type="button">注册</button>
          <button class="btn primary" id="logoutBtn" type="button" hidden>退出</button>
        </div>
      </div>
    </nav>

    <header class="hero">
      <div class="project-nav-row project-title-actions">
        <a class="btn ghost" href="index.html">返回仪表盘</a>
        <span class="project-time-chip" id="projectTimeSpent">累计用时 00:00:00</span>
      </div>
    </header>

    <main class="layout project-detail-layout">
      <div class="project-right-column">
        <section class="panel counter-panel reveal">
          <h2>行数计数器</h2>
          <div class="counter-wrap">
            <button class="btn ghost" data-action="decRow">-1</button>
            <div class="counter-display" id="rowCounter">0</div>
            <button class="btn primary" data-action="incRow">+1</button>
          </div>
          <p class="project-meta" id="progressText">进度 0%</p>
          <div class="counter-tools">
            <label>
              步进值
              <input id="stepInput" type="number" min="1" value="1" />
            </label>
            <button class="btn ghost" data-action="addStep">增加步进</button>
            <button class="btn danger" data-action="resetRows">行数清零</button>
          </div>
        </section>

        <section class="panel floating-timer-panel">
          <h3>全局计时器</h3>
          <div class="timer" id="globalTimerDisplay">25:00</div>
          <div class="timer-controls">
            <button class="btn primary" id="globalStartBtn" type="button">开始</button>
            <button class="btn ghost" id="globalPauseBtn" type="button">暂停</button>
            <button class="btn danger" id="globalResetBtn" type="button">重置</button>
          </div>
          <label>
            分钟
            <input id="globalTimerMinutes" type="number" min="1" value="25" />
          </label>
        </section>
      </div>

      <section class="panel project-panel reveal">
        <h2>项目信息</h2>
        <form id="projectForm" class="grid-form">
          <label>
            项目名称
            <input id="projectName" type="text" required />
          </label>
          <label>
            作品类型
            <select id="projectType">
              <option value="围巾">围巾</option>
              <option value="毛衣">毛衣</option>
              <option value="帽子">帽子</option>
              <option value="披肩">披肩</option>
              <option value="毯子">毯子</option>
              <option value="玩偶">玩偶</option>
              <option value="娃衣">娃衣</option>
              <option value="其他">其他</option>
            </select>
          </label>
          <label>
            项目状态
            <select id="projectStatus">
              <option value="active">进行中</option>
              <option value="paused">搁置</option>
              <option value="done">已完成</option>
            </select>
          </label>
          <label>
            总行数目标
            <input id="totalRows" type="number" min="0" />
          </label>
          <label>
            线材 / 品牌色号
            <input id="yarnInfo" type="text" placeholder="示例：美丽诺羊毛 / DMC 03" />
          </label>
          <label>
            工具 / 针号
            <input id="toolsInfo" type="text" placeholder="示例：棒针 / 4.0mm" />
          </label>
          <div class="full-span">
            <div class="diagram-box">
              <div class="diagram-split">
                <section class="diagram-card cover-card">
                  <h3 class="diagram-card-title">项目封面</h3>
                  <div class="diagram-card-body">
                    <input id="projectCoverInput" class="sr-only-input" type="file" accept="image/*" title="项目封面上传" aria-label="项目封面上传" />
                    <label for="projectCoverInput" class="btn ghost cover-upload-btn">选择或更换封面</label>
                    <button id="projectCoverRemoveBtn" class="btn danger cover-upload-btn" type="button" hidden>删除封面</button>
                    <div class="cover-frame">
                      <img id="projectCoverPreview" class="cover-preview in-diagram" alt="封面预览" />
                      <span class="cover-frame-placeholder">封面预览</span>
                    </div>
                  </div>
                </section>
                <section class="diagram-card text-card">
                  <h3 class="diagram-card-title">图解</h3>
                  <div class="diagram-card-body">
                    <textarea id="textDiagram" rows="3" title="图解文字" aria-label="图解文字" placeholder="请输入文字图解（可选）"></textarea>
                    <input id="diagramImageInput" class="sr-only-input" type="file" accept="image/*" multiple title="图解图片上传" aria-label="图解图片上传" />
                    <label for="diagramImageInput" class="btn ghost cover-upload-btn">选择并追加图片图解</label>
                    <div class="cover-frame">
                      <div id="diagramImageGallery" class="diagram-image-gallery"></div>
                      <span id="diagramImagePlaceholder" class="cover-frame-placeholder">图片图解预览</span>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </div>
          <button class="btn primary" type="submit">保存项目</button>
        </form>
      </section>

    </main>

    <div id="feedbackToast" class="feedback-toast" role="status" aria-live="polite"></div>

    <div class="dialog-backdrop" id="authDialog" hidden>
      <div class="dialog-card auth-dialog-card" role="dialog" aria-modal="true" aria-labelledby="authDialogTitle">
        <h3 id="authDialogTitle">账号登录</h3>
        <form id="authForm" onsubmit="return false;">
          <p id="authStatus" class="auth-status">未登录（当前仅本地保存）</p>
          <label>
            邮箱
            <input id="authEmail" type="email" placeholder="请输入邮箱" autocomplete="email" />
          </label>
          <label>
            密码
            <input id="authPassword" type="password" placeholder="请输入密码" autocomplete="current-password" />
          </label>
          <div class="dialog-actions">
            <button class="btn primary" id="loginBtn" type="button">登录</button>
            <button class="btn ghost" id="registerBtn" type="button">注册</button>
            <button class="btn danger" id="closeAuthDialogBtn" type="button">关闭</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="footer">愿你的每一针，都织进生活的温度。</footer>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\\/script>');
      }
    </script>
    <script src="cloud-sync.js"></script>
    <script src="project.js"></script>
  </body>
</html>
