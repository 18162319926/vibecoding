<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织伴 | 毛线仓库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-storage-page="yarn">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="top-nav" aria-label="页面导航">
      <div class="brand-wrap">
        <div class="brand">织伴</div>
        <p class="brand-subtitle">把时间织成柔软的样子</p>
        <p class="eyebrow nav-eyebrow">KNIT COMPANION</p>
      </div>
      <div class="nav-center" aria-label="页面标签">
        <a class="btn ghost" href="index.html#dashboardPanel">项目仪表盘</a>
        <a class="btn ghost is-tab-active" href="yarn.html">毛线仓库</a>
        <a class="btn ghost" href="swatch.html">小样仓库</a>
        <a class="btn ghost" href="stats.html">数据统计</a>
      </div>
      <div class="nav-auth">
        <button class="sync-state sync-state-idle" id="storageSyncHint" type="button" title="点击立即同步">☁️ 离线模式</button>
        <span class="account-chip" id="accountChip">当前账号：未登录</span>
        <button class="btn ghost" id="openLoginBtn" type="button">登录</button>
        <button class="btn ghost" id="openRegisterBtn" type="button">注册</button>
        <button class="btn primary" id="logoutBtn" type="button" hidden>退出</button>
      </div>
    </nav>

    <section class="panel sync-diagnostics" id="syncDiagnosticsPanel">
      <details>
        <summary>同步诊断面板</summary>
        <div class="sync-diagnostics-grid">
          <p>本地条目：<strong id="diagLocalCount">0</strong></p>
          <p>云端条目：<strong id="diagRemoteCount">0</strong></p>
          <p>最近推送：<strong id="diagLastPush">-</strong></p>
          <p>最近拉取：<strong id="diagLastPull">-</strong></p>
          <p class="full">最后错误：<strong id="diagLastError">无</strong></p>
        </div>
        <div class="sync-diagnostics-actions">
          <button class="btn ghost" id="storageDiagRefreshBtn" type="button">立即拉取云端</button>
        </div>
      </details>
    </section>

    <main class="layout storage-layout">
      <section class="panel storage-panel storage-form-panel">
        <h2>毛线条目</h2>
        <form class="grid-form" id="storageForm">
          <label>
            品牌
            <input id="yarnBrand" type="text" placeholder="例如：DMC" required />
          </label>
          <label>
            线材类型
            <input id="yarnType" type="text" placeholder="例如：美丽诺羊毛" required />
          </label>
          <label>
            色号
            <input id="yarnColorNo" type="text" placeholder="例如：716" />
          </label>
          <label>
            适用针号
            <input id="needleSize" type="text" placeholder="例如：3.5mm" />
          </label>
          <label>
            重量（g）
            <input id="weight" type="number" min="0" placeholder="例如：50" />
          </label>
          <label>
            使用季节
            <select id="season">
              <option>春秋</option>
              <option>夏季</option>
              <option>冬季</option>
              <option>四季通用</option>
            </select>
          </label>
          <label>
            消耗进度（%）
            <input id="progress" type="number" min="0" max="100" placeholder="0-100" />
          </label>
          <label class="full-span">
            毛线实拍图
            <input id="photoInput" type="file" accept="image/*" />
            <div class="storage-form-photo-wrap" id="photoWrap" hidden>
              <img id="photoPreview" class="storage-form-photo" alt="毛线实拍图预览" hidden />
              <button id="removePhotoBtn" class="storage-photo-remove" type="button" hidden aria-label="删除毛线图片">×</button>
            </div>
          </label>
          <div class="full-span">
            <div class="storage-form-actions">
              <button class="btn primary" id="submitBtn" type="submit">新增毛线条目</button>
              <button class="btn ghost" id="cancelEditBtn" type="button" hidden>取消编辑</button>
            </div>
          </div>
        </form>
      </section>

      <section class="panel storage-panel storage-list-panel">
        <div class="storage-list-head">
          <h2>库存列表</h2>
          <p class="helper-text">共 <strong id="storageCount">0</strong> 条，可编辑或删除。</p>
        </div>
        <div class="storage-list" id="storageList"></div>
      </section>
    </main>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\\/script>');
      }
    </script>
    <script src="cloud-sync.js"></script>
    <script src="storage-account.js"></script>
    <script src="storage.js"></script>
  </body>
</html>
