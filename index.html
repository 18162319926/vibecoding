<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织伴 | 织毛线辅助站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <header class="hero">
      <div>
        <p class="eyebrow">KNIT COMPANION</p>
        <h1>织伴</h1>
        <p class="subtitle">让每一行针目都被温柔记录</p>
      </div>
      <div class="hero-stats" aria-label="今日进度">
        <div class="stat-card">
          <span>项目总数</span>
          <strong id="projectCount">0</strong>
        </div>
        <div class="stat-card">
          <span>进行中</span>
          <strong id="activeCount">0</strong>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="panel dashboard-panel reveal">
        <h2>项目仪表盘</h2>
        <div class="dashboard-toolbar">
          <div class="status-filters" id="statusFilters">
            <button class="btn ghost is-active" type="button" data-filter="all">全部</button>
            <button class="btn ghost" type="button" data-filter="active">进行中</button>
            <button class="btn ghost" type="button" data-filter="paused">搁置</button>
            <button class="btn ghost" type="button" data-filter="done">已完成</button>
          </div>
          <div class="import-export-actions">
            <button class="btn primary" id="createProjectBtn" type="button">新建空白项目</button>
            <button class="btn ghost" id="exportProjectsBtn" type="button">导出项目图片</button>
            <button class="btn ghost" id="importProjectsBtn" type="button">导入项目</button>
            <input id="importProjectsInput" type="file" accept="application/json" hidden />
          </div>
        </div>
        <p class="helper-text">点击卡片“进入项目”跳转到独立项目页管理详情。</p>
        <div id="projectCards" class="project-cards"></div>
      </section>

      <section class="panel diagram-import-panel reveal">
        <h2>图解导入并新建项目</h2>
        <p class="helper-text">支持粘贴带字段的图解文本，自动识别项目名称、工具、材料、文字图解。</p>
        <div class="import-export-actions">
          <button class="btn ghost" id="pickDiagramImageBtn" type="button">选择图解图片</button>
          <button class="btn ghost" id="ocrDiagramImageBtn" type="button">识别图片并新建项目</button>
          <input id="diagramImageInput" type="file" accept="image/*" hidden />
        </div>
        <p class="helper-text" id="diagramImageStatus">未选择图片</p>
        <textarea id="diagramImportText" rows="7" placeholder="项目名称：奶油围巾\n工具：4.0mm 棒针\n材料：羊毛线2团、记号扣6个\n文字图解：起针40针，2上2下...\n第9行开始每6行两侧各加1针"></textarea>
        <button class="btn primary" id="parseDiagramBtn" type="button">解析图解并新建</button>
      </section>

    </main>

    <canvas id="dashboardExportCanvas" width="1200" height="1600" hidden></canvas>

    <aside class="floating-timer" id="floatingTimer">
      <h3>全局计时器</h3>
      <p class="helper-text">跨项目共享</p>
      <div class="timer" id="globalTimerDisplay">25:00</div>
      <div class="timer-controls">
        <button class="btn primary" id="globalStartBtn" type="button">开始</button>
        <button class="btn ghost" id="globalPauseBtn" type="button">暂停</button>
        <button class="btn danger" id="globalResetBtn" type="button">重置</button>
      </div>
      <label>
        分钟
        <input id="globalTimerMinutes" type="number" min="1" value="25" />
      </label>
    </aside>

    <footer class="footer">愿你的每一针，都织进生活的温度。</footer>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
