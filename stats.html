<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织伴 | 数据统计</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-stats-page="true">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="top-nav" aria-label="页面导航">
      <div class="brand-wrap">
        <div class="brand">织伴</div>
        <p class="brand-subtitle">把时间织成柔软的样子</p>
        <p class="eyebrow nav-eyebrow">KNIT COMPANION</p>
      </div>
      <div class="nav-center" aria-label="页面标签">
        <a class="btn ghost" href="index.html#dashboardPanel">项目仪表盘</a>
        <a class="btn ghost" href="yarn.html">毛线仓库</a>
        <a class="btn ghost" href="swatch.html">小样仓库</a>
        <a class="btn ghost is-tab-active" href="stats.html">数据统计</a>
      </div>
      <div class="nav-auth">
        <button class="sync-state sync-state-idle" id="syncHint" type="button" title="点击立即同步">☁️ 离线模式</button>
        <span class="account-chip" id="accountChip">当前账号：未登录</span>
        <button class="btn ghost" id="openLoginBtn" type="button">登录</button>
        <button class="btn ghost" id="openRegisterBtn" type="button">注册</button>
        <button class="btn primary" id="logoutBtn" type="button" hidden>退出</button>
      </div>
    </nav>

    <main class="layout">
      <section class="panel dashboard-panel">
        <div class="dashboard-toolbar">
          <h2>时间周期</h2>
          <div class="status-filters" id="periodFilters">
            <button class="btn ghost is-active" type="button" data-period="today">今日</button>
            <button class="btn ghost" type="button" data-period="week">本周</button>
            <button class="btn ghost" type="button" data-period="month">本月</button>
            <button class="btn ghost" type="button" data-period="all">全部历史</button>
          </div>
        </div>
      </section>

      <section class="panel dashboard-panel">
        <h2>总览</h2>
        <div class="hero-stats stats-analytics-grid">
          <div class="stat-card stat-card-core"><span>项目总数</span><strong id="statProjectCount">0</strong></div>
          <div class="stat-card stat-card-core"><span>进行中</span><strong id="statActiveCount">0</strong></div>
          <div class="stat-card stat-card-today"><span>累计时长</span><strong id="statTotalDuration">00:00:00</strong></div>
          <div class="stat-card stat-card-today"><span>累计行数</span><strong id="statTotalRows">0</strong></div>
        </div>
      </section>

      <section class="panel dashboard-panel">
        <h2>项目排行</h2>
        <div id="projectRanking" class="storage-list"></div>
      </section>

      <section class="panel dashboard-panel">
        <h2>本日分布</h2>
        <canvas id="todayTrendCanvas" width="980" height="320"></canvas>
      </section>
    </main>

    <script src="stats.js"></script>
  </body>
</html>
