<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织伴 | 数据统计</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-stats-page="true">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="top-nav" aria-label="页面导航">
      <div class="brand-wrap">
        <div class="brand">织伴</div>
        <p class="brand-subtitle">把时间织成柔软的样子</p>
        <p class="eyebrow nav-eyebrow">KNIT COMPANION</p>
      </div>
      <div class="nav-center" aria-label="页面标签">
        <a class="btn ghost" href="index.html#dashboardPanel">项目仪表盘</a>
        <a class="btn ghost" href="yarn.html">毛线仓库</a>
        <a class="btn ghost" href="swatch.html">小样仓库</a>
        <a class="btn ghost is-tab-active" href="stats.html">数据统计</a>
      </div>
      <div class="nav-auth" id="navAuth">
        <button class="nav-auth-trigger" id="navAuthTrigger" type="button" aria-label="账号菜单" aria-expanded="false" tabindex="0">
          <span>☰</span>
        </button>
        <div class="nav-auth-menu" id="navAuthMenu">
          <button class="sync-state sync-state-idle" id="syncHint" type="button" title="点击立即同步">☁️ 离线模式</button>
          <span class="account-chip" id="accountChip">当前账号：未登录</span>
          <button class="btn ghost" id="openLoginBtn" type="button">登录</button>
          <button class="btn ghost" id="openRegisterBtn" type="button">注册</button>
          <button class="btn primary" id="logoutBtn" type="button" hidden>退出</button>
        </div>
      </div>
    </nav>

    <main class="layout">
      <section class="panel dashboard-panel">
        <div class="dashboard-toolbar stats-toolbar-row">
          <div class="stats-toolbar-center">
            <div class="status-filters" id="periodFilters">
              <button class="btn ghost is-active" type="button" data-period="week">本周</button>
              <button class="btn ghost" type="button" data-period="month">本月</button>
              <button class="btn ghost" type="button" data-period="all">历史</button>
            </div>
          </div>
          <a class="btn primary" href="report.html" id="reportManageBtn">报告管理</a>
        </div>
      </section>

      <!-- 数据总览：所有周期显示相同 -->
      <section class="panel dashboard-panel">
        <h2>数据总览</h2>
        <div class="hero-stats stats-analytics-grid stats-storage-grid">
          <div class="stat-card stat-card-core"><span>项目总数</span><strong id="statProjectCount">0</strong></div>
          <div class="stat-card stat-card-core"><span>累计总时长</span><strong id="statTotalDuration">00:00:00</strong></div>
          <div class="stat-card stat-card-core"><span>累计总行数</span><strong id="statTotalRows">0</strong></div>
          <div class="stat-card stat-card-core"><span>累计消耗毛线</span><strong id="statTotalYarnUsed">0g</strong></div>
        </div>
      </section>

      <!-- 时间投入统计 -->
      <section class="panel dashboard-panel">
        <h2>时间投入统计</h2>
        <div class="hero-stats stats-analytics-grid stats-storage-grid">
          <div class="stat-card stat-card-core"><span>总编织时长</span><strong id="statPeriodTotalDuration">00:00:00</strong></div>
          <div class="stat-card stat-card-core"><span>偏好时段</span><strong id="statPreferredSlot">暂无数据</strong></div>
          <div class="stat-card stat-card-core"><span>平均每日编织时长</span><strong id="statAvgDailyDuration">00:00:00</strong></div>
          <div class="stat-card stat-card-core"><span>单日最长编织时长</span><strong id="statMaxDailyDuration">00:00:00</strong></div>
        </div>
      </section>

      <!-- 行为统计 -->
      <section class="panel dashboard-panel">
        <h2>行为统计</h2>
        <div class="hero-stats stats-analytics-grid stats-storage-grid">
          <div class="stat-card stat-card-core"><span>编织总行数</span><strong id="statPeriodTotalRows">0</strong></div>
          <div class="stat-card stat-card-core"><span>消耗毛线</span><strong id="statPeriodYarnUsed">0g</strong></div>
          <div class="stat-card stat-card-core"><span>平均每日编织行数</span><strong id="statAvgDailyRows">0</strong></div>
          <div class="stat-card stat-card-core"><span>单日编织最大行数</span><strong id="statMaxDailyRows">0</strong></div>
        </div>
      </section>


      <!-- 偏好时段分布柱状图（唯一） -->
      <section class="panel dashboard-panel">
        <h2>偏好时段分布</h2>
        <canvas id="preferredSlotCanvas" width="980" height="260"></canvas>
        <p class="helper-text" id="preferredSlotHint">按当前周期统计小时分布。</p>
      </section>

      <!-- 周期趋势图（唯一） -->
      <section class="panel dashboard-panel">
        <h2 id="trendTitle">周期趋势图</h2>
        <canvas id="trendCanvas" width="980" height="320"></canvas>
        <p class="helper-text" id="trendHint">时长与行数采用双折线趋势展示。</p>
      </section>

    </main>

    <div class="dialog-backdrop" id="authDialog" hidden>
      <div class="dialog-card auth-dialog-card" role="dialog" aria-modal="true" aria-labelledby="authDialogTitle">
        <h3 id="authDialogTitle">账号登录</h3>
        <p id="authStatus" class="auth-status">未登录（当前仅本地保存）</p>
        <form id="authForm" autocomplete="on" onsubmit="return false;">
          <label>
            邮箱
            <input id="authEmail" type="email" placeholder="请输入邮箱" autocomplete="email" />
          </label>
          <label>
            密码
            <input id="authPassword" type="password" placeholder="请输入密码" autocomplete="current-password" />
          </label>
          <div class="dialog-actions">
            <button class="btn primary" id="loginBtn" type="button">登录</button>
            <button class="btn ghost" id="registerBtn" type="button">注册</button>
            <button class="btn danger" id="closeAuthDialogBtn" type="button">关闭</button>
          </div>
        </form>
      </div>
    </div>

    <script src="stats.js"></script>
      <script>
        // 保证 yarnItems 先加载再渲染统计
        function refreshStatsPage() {
          if (typeof loadYarnState === 'function') loadYarnState();
          if (typeof loadProjectState === 'function') loadProjectState();
          if (typeof renderAll === 'function') renderAll();
        }
        refreshStatsPage();
        // 页面获取焦点时自动刷新
        window.addEventListener('focus', refreshStatsPage);
        // 监听本地存储变更自动刷新（修正：项目数据key应为 knit-helper-state）
        window.addEventListener('storage', function(e) {
          if (e.key === 'knit-yarn-storage' || e.key === 'knit-helper-state') {
            refreshStatsPage();
          }
        });
      </script>
  </body>
</html>
